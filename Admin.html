  max-width: 100%;

  /* Container utama dashboard agar memenuhi sisa layar tanpa meluap */
  .dashboard-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden; /* Mencegah seluruh halaman ikut ter-scroll */
  }

  /* Area tabel dengan scroll otomatis */
  .table-scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    background: white;
  }

  /* Header tabel tetap di atas (Sticky) */
  #tabel-master thead th {
    position: sticky;
    top: 0;
    z-index: 20;
    background-color: #f8fafc;
    border-bottom: 2px solid #f1f5f9;
  }

  /* Scrollbar kustom tipis agar tidak memakan tempat */
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
  }

/* EFEK SAAT KURSOR MENYENTUH (HOVER) - PUTIH TIPIS */
.daftar-item {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
  position: relative;
}

.daftar-item:hover {
  transform: translateY(-4px) scale(1.01) !important;
  z-index: 40 !important;
  
  /* Shadow Putih Tipis (Soft Glow) */
  box-shadow: 0 10px 20px rgba(255, 255, 255, 0.08), 
              0 4px 10px rgba(0, 0, 0, 0.2) !important;
  
  /* Border Putih Transparan */
  border-color: rgba(255, 255, 255, 0.2) !important; 
}

/* Efek pada judul saat hover */
.daftar-item:hover h3 {
  text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);

}

</style>

// Fungsi Pembantu: Mengambil Checkbox Format Utama (Tetap sama)
function dapatkanFormatChecked() {
  const formats = [];
  document.querySelectorAll('input[name="format"]:checked').forEach(cb => {
    if (cb.value && cb.value !== "on") formats.push(cb.value);
  });
  return formats.length > 0 ? formats.join(", ") : "-";
}

// FUNGSI UNTUK BLOK 1: METADATA PENGIRIM (VERSI UPDATE)
function jalankanMetadata(statusAksi) {
  try {
    // 1. Ambil data dasar (ID dan Judul Utama)
    const idDoc = document.getElementById('display-id')?.innerText.trim() || "";
    const elJudul = document.getElementById('inp-judul')?.value || "";

    let lampiranJ_O = ["", "", "", "", "", ""]; 
    let ringkasanFormatE = [];

    // 2. Scan elemen berdasarkan Class 'item-lampiran' (Struktur HTML Anda sekarang)
    const elemenLampiran = document.querySelectorAll('.item-lampiran');

    elemenLampiran.forEach((baris, index) => {
      // Ambil input judul di dalam baris ini
      const inputJudul = baris.querySelector('.inp-judul-file');
      const valJudul = inputJudul ? inputJudul.value.trim() : "";

      if (valJudul !== "" && index < 6) {
        // Ambil checkbox format yang dicentang di dalam baris ini saja
        const checks = baris.querySelectorAll('.inp-format-file:checked');
        let formats = Array.from(checks).map(cb => cb.value);
        
        // GABUNGKAN Judul & Format (Metode Sukses)
        const teksFormat = formats.length > 0 ? " [" + formats.join("/") + "]" : "";
        lampiranJ_O[index] = valJudul + teksFormat;

        // Tambahkan ke daftar untuk ringkasan Kolom E
        if (formats.length > 0) {
          ringkasanFormatE.push(formats.join("/"));
        }
      }
    });

    const payload = {
      id: idDoc,
      judul: elJudul,
      status: statusAksi,
      format: ringkasanFormatE.join(", ") || "-", // Untuk Kolom E
      lampiran_terpisah: lampiranJ_O,             // Untuk Kolom J-O
      url: "" 
    };

    // 3. NOTIFIKASI LOADING (SweetAlert2)
    Swal.fire({
      title: 'Sedang Memproses...',
      text: 'Mohon tunggu, data sedang dikirim ke sistem.',
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    google.script.run
  .withSuccessHandler(function(res) {
    Swal.fire({
      title: "Berhasil!",
      text: res.message,
      icon: "success",
      timer: 2000
    });

    // PANGGIL RESET DI SINI
    // Gunakan 'Metadata' (M besar) sesuai kondisi di fungsi reset Anda
    resetFormMetadata('Metadata'); 
  })
  .withFailureHandler(function(err) {
    Swal.fire("Gagal", err.message, "error");
  })
  .publishProses(payload);

  } catch (e) {
    Swal.fire("Kesalahan JS", e.message, "error");
  }
}

function resetFormMetadata(jenis) {
  // Gunakan .toLowerCase() agar tidak sensitif terhadap huruf besar/kecil
  if (jenis.toLowerCase() === 'metadata') {
    
    // 1. Kosongkan Judul & Profil
    const fields = ['inp-judul', 'inp-nama', 'inp-nip', 'inp-pangkat', 'inp-jabatan', 'inp-hp', 'inp-unit', 'unit-kerja-tujuan'];
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = "";
    });

    // 2. Kosongkan Checkbox Format Utama (Kolom E)
    const formatUtama = document.querySelectorAll('input[name="format"]');
    formatUtama.forEach(cb => cb.checked = false);

    // 3. Kosongkan 6 Baris Lampiran (Judul & Checkbox)
    // Mencari berdasarkan class yang Anda gunakan di HTML terbaru
    const inpJudulFile = document.querySelectorAll('.inp-judul-file');
    inpJudulFile.forEach(input => input.value = "");

    const cbFormatFile = document.querySelectorAll('.inp-format-file');
    cbFormatFile.forEach(cb => cb.checked = false);

  } else {
    // Reset untuk jenis PORTAL
    const pFields = ['inp-judul-portal', 'inp-url'];
    pFields.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = "";
    });
  }

  // 4. REFRESH ID & TABEL (Penting agar ID tidak duplikat)
  if (typeof generateAutoID === "function") {
      generateAutoID(); // Sesuaikan dengan nama fungsi generate ID Anda
  } else if (typeof loadAutoID === "function") {
      loadAutoID();
  }

  // Refresh tabel data di bawahnya jika ada
  if (typeof muatDataMaster === "function") {
      setTimeout(muatDataMaster, 800);
  }
}

// Fungsi Filter Pencarian di Tabel
function filterTabelMaster() {
  const input = document.getElementById("input-cari");
  const filter = input.value.toUpperCase();
  const table = document.getElementById("tabel-master");
  const tr = table.getElementsByTagName("tr");

  for (let i = 1; i < tr.length; i++) { // Mulai dari 1 untuk lewati header
    let tdID = tr[i].getElementsByTagName("td")[1]; // Kolom ID Judul
    let tdJudul = tr[i].getElementsByTagName("td")[2]; // Kolom Judul Dokumen
    
    if (tdID || tdJudul) {
      let txtID = tdID.textContent || tdID.innerText;
      let txtJudul = tdJudul.textContent || tdJudul.innerText;
      
      if (txtID.toUpperCase().indexOf(filter) > -1 || txtJudul.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}

    title: isDraf ? 'Nonaktifkan Formulir?' : 'Aktifkan Formulir?',

      ? `Pengiriman untuk ID ${idJudul} akan dihentikan sementara.` 
      : `Formulir ${idJudul} akan kembali muncul di Portal Pengiriman.`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: isDraf ? '#f43f5e' : '#0ea5e9', // Merah untuk Draf, Biru untuk Publish
    cancelButtonColor: '#94a3b8',
    confirmButtonText: isDraf ? 'Ya, Nonaktifkan!' : 'Ya, Aktifkan!',

  }).then((result) => {

      // Menampilkan loading saat proses server berjalan

      google.script.run
        .withSuccessHandler(function(res) {

            Swal.fire({
              title: 'Berhasil!',

    wrapper.classList.add('file-attached');
    // Munculkan Ikon Centang
    icon.classList.remove('hidden');

function editData(id) {
  // 1. Cari baris di tabel berdasarkan ID
  const rows = document.querySelectorAll('#isiTabel tr');
  let selectedRow = null;
  
  rows.forEach(row => {
    if (row.cells[1].innerText === id) selectedRow = row;
  });

  if (selectedRow) {
    // 2. Isi kembali formulir dengan data dari tabel
    document.getElementById('autoId').value = selectedRow.cells[1].innerText;
    document.getElementsByName('jenis')[0].value = selectedRow.cells[2].innerText;
    document.getElementsByName('nomor')[0].value = selectedRow.cells[4].innerText;
    document.getElementsByName('judul')[0].value = selectedRow.cells[3].innerText;
    document.getElementsByName('tgl_terbit')[0].value = selectedRow.cells[5].innerText;

    // 3. Ubah tampilan tombol SIMPAN menjadi UPDATE
    const btn = document.getElementById('btnSubmitDoc');
    btn.innerHTML = 'UPDATE DATA <i class="fa-solid fa-pen-to-square ml-1"></i>';
    btn.classList.replace('bg-sky-600', 'bg-amber-500');
    btn.setAttribute('data-mode', 'edit'); // Tandai bahwa ini mode edit

    // 4. Scroll otomatis ke atas (ke formulir)
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    // Beri notifikasi kecil
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
    Toast.fire({ icon: 'info', title: 'Mode Edit Aktif' });
  }
}

function hapusData(id) {
  Swal.fire({
    title: 'Hapus Data?',
    text: "Data dengan ID " + id + " akan dihapus permanen!",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#e11d48',
    cancelButtonColor: '#64748b',
    confirmButtonText: 'Ya, Hapus!'
  }).then((result) => {
    if (result.isConfirmed) {
      // Panggil fungsi hapus di server
      google.script.run.withSuccessHandler(res => {
        Swal.fire('Terhapus!', res, 'success');
        muatDataRekapan();
      }).hapusDataProses(id);
    }
  });
}

function handleSimpanDokumen(formElement) {
  const btn = document.getElementById('btnSubmitDoc');
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  
  // Ambil mode dari atribut data tombol (default: 'simpan')
  const mode = btn.getAttribute('data-mode') || 'simpan';
  const idDoc = document.getElementById('autoId').value;
  
  btn.disabled = true;
  btn.innerHTML = 'Memproses... <i class="fa-solid fa-spinner fa-spin"></i>';

  const siapkanPayload = (fileData = null) => {
    return {
      mode: mode,
      id_doc: idDoc,
      jenis: formElement.jenis.value,
      nomor: formElement.nomor.value,
      judul: formElement.judul.value,
      tgl_terbit: formElement.tgl_terbit.value,
      fileBlob: fileData
    };
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const bytes = e.target.result.split(',')[1];
      const dataPayload = siapkanPayload({
        bytes: bytes,
        mimeType: file.type,
        fileName: file.name
      });
      kirimKeServer(dataPayload);
    };
    reader.readAsDataURL(file);
  } else {
    kirimKeServer(siapkanPayload(null));
  }
}

function kirimKeServer(payload) {
  // Notifikasi Loading Profesional
  Swal.fire({
    title: 'Menyimpan Data',
    text: 'Mohon tunggu sebentar...',
    allowOutsideClick: false,
    didOpen: () => { Swal.showLoading(); }
  });

  google.script.run
    .withSuccessHandler(res => {
      if (res.includes("Berhasil")) {
        Swal.fire({
          icon: 'success',
          title: 'Berhasil!',
          text: res,
          timer: 1500,
          showConfirmButton: false
        });

        // --- PROSES PEMBARUAN OTOMATIS ---
        document.getElementById('formUploadDoc').reset(); // Kosongkan form
        
        // 1. Reset efek visual shadow/icon pada input file
        const wrapper = document.getElementById('fileWrapper');
        if(wrapper) wrapper.classList.remove('file-attached');
        const icon = document.getElementById('fileStatusIcon');
        if(icon) icon.classList.add('hidden');

        // 2. Kembalikan Tombol ke Mode Simpan (Default)
        const btn = document.getElementById('btnSubmitDoc');
        btn.disabled = false;
        btn.innerHTML = 'SIMPAN <i class="fa-solid fa-check"></i>';
        btn.classList.remove('bg-amber-500'); // Hapus warna oranye edit
        btn.classList.add('bg-sky-600');    // Kembalikan ke warna biru
        btn.removeAttribute('data-mode');    // Hapus status mode edit

        // 3. Panggil kembali fungsi untuk memunculkan ID baru dan Tabel
        ambilIdBaru();     
        muatDataRekapan(); 

      } else {
        Swal.fire({ icon: 'error', title: 'Gagal', text: res });
        const btn = document.getElementById('btnSubmitDoc');
        btn.disabled = false;
        // Jika gagal, teks tombol tetap sesuai mode (Update/Simpan)
      }
    })
    .withFailureHandler(err => {
      Swal.fire({ icon: 'error', title: 'Error Sistem', text: err });
      document.getElementById('btnSubmitDoc').disabled = false;
    })
    .uploadDokumenProses(payload);
}
