<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <style>
    .container {
  width: 100%; /* Gunakan 100% agar mengikuti lebar kotak Google Sites */
  max-width: 100%;
  margin: 0 auto;
}
    /* Custom Scrollbar untuk tampilan lebih modern */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 2px solid #0f172a; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }

    body { 
      background-color: #0f172a; 
      font-family: 'Inter', sans-serif; 
      color: #f8fafc; 
      margin: 0; 
      padding: 15px;
      overflow-x: hidden;
    }

    /* Grid Responsif: 4 kolom di Laptop, 1 kolom di HP */
    .grid-dokumen {
      display: grid;
      gap: 15px;
      grid-template-columns: repeat(4, 1fr);
    }
    
    @media (max-width: 1280px) { .grid-dokumen { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1024px) { .grid-dokumen { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .grid-dokumen { grid-template-columns: 1fr; } }

    .card-dokumen {
      position: relative;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 2rem;
      overflow: hidden;
      min-height: 220px;
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
    }

    .card-bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      filter: blur(2px);
      z-index: 0;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #020617, rgba(2, 6, 23, 0.6), transparent);
      z-index: 1;
    }

    .card-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-grow: 1;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fadeIn {
    animation: fadeIn 0.4s ease-out forwards;
  }
  </style>
</head>
<body>

  <div class="max-w-[1440px] mx-auto min-h-screen">
    <!-- Header: Tombol Kembali Hijau -->
    <div class="flex items-center justify-between mb-6">
      <button onclick="loadPage('Index')" class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-black transition-all shadow-lg shadow-emerald-900/40">
        <i class="fa-solid fa-house-chimney"></i> KEMBALI KE HOME
      </button>
      <div class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">PORTALDATA_RENKEU</div>
    </div>

    <!-- Search Section Identik dengan Peraturan -->
    <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl mb-6 backdrop-blur-md">
      <div class="flex flex-col md:flex-row items-center gap-4">
        <div class="flex items-center gap-3 shrink-0">
          <div class="bg-sky-500/20 p-2 rounded-lg text-sky-400">
            <i class="fa-solid fa-scale-balanced text-xl"></i>
          </div>
          <h1 class="text-xl font-black tracking-tighter uppercase italic text-white">PortalData Dokumen</h1>
        </div>
        
        <div class="relative w-full flex gap-2">
          <div class="relative flex-1">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" onkeyup="if(event.key==='Enter') filterData()" placeholder="Cari Judul atau Keterangan Dokumen..." 
                   class="w-full bg-slate-100 text-slate-900 pl-11 pr-4 py-3 rounded-xl font-bold text-sm outline-none">
          </div>
          <button onclick="filterData()" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-l font-black text-xs transition-all flex items-center gap-2">
            CARI <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="flex flex-col justify-center items-center py-32">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 border-4 border-cyan-500/20 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <p class="mt-5 text-[10px] text-slate-500 font-black uppercase tracking-[0.5em]">Sinkronisasi Dokumen...</p>
    </div>

    <!-- Container Grid Dokumen -->
    <div id="dokumenContainer" class="grid-dokumen hidden mb-10"></div>
  </div>

  <script>

const googleScriptUrl = "<?= ScriptApp.getService().getUrl() ?>";

    document.addEventListener('DOMContentLoaded', () => {
      google.script.run
        .withSuccessHandler(renderDokumen)
        .withFailureHandler(err => {
          document.getElementById('loadingState').innerHTML = `<p class="text-red-400 font-bold">Error: ${err.message}</p>`;
        })
        .getDataRekapan(); 
    });

  function renderDokumen(data) {
  const container = document.getElementById('dokumenContainer');
  const loader = document.getElementById('loadingState');
  let html = '';

  // 1. FILTER: Pastikan mengambil kategori "Dokumen Lain"
  const filteredData = data.filter(row => row[2] === "Dokumen Lain");

  if (filteredData.length === 0) {
    html = '<div class="col-span-full text-center text-slate-500 py-20 font-black uppercase tracking-widest italic text-xs">Tidak ada data Dokumen Lain ditemukan</div>';
  } else {
    filteredData.forEach(row => {
      try {
        // 2. LOGIKA IDENTIK PERATURAN: Ambil ID File dari Kolom G (Indeks 6)
        const rawLink = row[6] ? row[6].toString().trim() : "";
        const fileIdMatch = rawLink.match(/[-\w]{25,}/);
        const fileId = fileIdMatch ? fileIdMatch[0] : null;
        
        let finalLink = "javascript:void(0)";
        let btnText = 'DOWNLOAD <i class="fa-solid fa-download ml-1"></i>';
        // Warna tombol Hijau untuk membedakan dari Peraturan (Cyan)
        let btnColor = "bg-emerald-600 hover:bg-emerald-500 shadow-emerald-900/40";

        // 3. ENKRIPSI SAFELINK: Harus sama persis agar Code.gs tidak blank
        if (fileId) {
          const dlLink = "https://docs.google.com/uc?export=download&id=" + fileId;
          // Menggunakan encodeURIComponent + btoa sesuai kode Peraturan Anda
          const encrypted = encodeURIComponent(btoa(dlLink)); 
          finalLink = googleScriptUrl + "?p=Safelink&get=" + encrypted;
        } else {
          btnText = "LINK TIDAK TERSEDIA";
          btnColor = "bg-slate-700 cursor-not-allowed";
        }

        // Variabel pendukung
        const tglTerbit = row[5] || "-";
        const judulDoc = row[3] || "TANPA JUDUL";
        const nomorDoc = row[4] || "-";
        const idDoc = row[1] || "D-000";

      html += `
<div class="card-peraturan item-card group relative overflow-hidden bg-slate-900/50 rounded-2xl border border-white/5 hover:-translate-y-2 transition-all duration-500 h-full" data-search="${judulDoc} ${nomorDoc}">
  
  <!-- Gambar Background BOX -->
  <img src="https://images.unsplash.com/photo-1450101499163-c8848c66ca85?q=60&w=600&auto=format" 
       class="absolute inset-0 w-full h-full object-cover opacity-20 group-hover:scale-110 transition-transform duration-700 pointer-events-none">
  
  <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/80 to-transparent"></div>

  <div class="relative z-10 p-5 flex flex-col h-full !pt-3"> 
    <div>
      <div class="flex justify-between items-center mb-2">
        <!-- Badge ID: Diubah ke Hijau (Emerald) -->
        <span class="text-[8px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/20 shadow-sm">
          ID: ${row[1] || 'D-000'}
        </span>
        
        <!-- Badge Tanggal Terbit (Emerald) -->
        <span class="text-[11px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/20 shadow-sm">
          <i class="fa-regular fa-calendar-check mr-1 text-[8px]"></i> ${tglTerbit}
        </span>
      </div>
      
      <!-- Judul Dokumen: line-clamp-4 -->
      <h3 class="text-[10px] font-black text-white uppercase italic tracking-tight leading-relaxed mb-2 group-hover:text-emerald-400 transition-colors line-clamp-4">
        ${judulDoc}
      </h3>
    </div>

    <div class="mt-auto pt-2 border-t border-white/5">
      <div class="flex justify-between items-center mb-2">
        <!-- Badge Nomor SK (Amber) -->
        <span class="text-[10px] font-bold text-amber-400 bg-amber-500/10 px-2 py-1 rounded-md border border-amber-500/20 shadow-sm">
          <i class="fa-solid fa-file-signature mr-1 text-[8px]"></i> ${nomorDoc}
        </span>
        
        <span class="text-[9px] font-black text-emerald-500 tracking-tighter uppercase">DOKUMEN</span>
      </div>
      
      <!-- Tombol Download: Sekarang berwarna Hijau Emerald -->
    <a href="${finalLink}" ${fileId ? 'target="_blank"' : ''} class="w-full block py-2.5 ${btnColor} text-white text-center rounded-xl text-[10px] font-black transition-all shadow-lg uppercase active:scale-95">
        ${btnText}
      </a>
    </div>
  </div>
</div>`;
   } catch (err) {
        console.error("Error rendering row:", err);
      }
    });
  }

  container.innerHTML = html;
  if (loader) loader.style.display = 'none';
  container.classList.remove('hidden');
}

    function filterData() {
      const val = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.getElementsByClassName('item-card');
      const container = document.getElementById('dokumenContainer'); // Sesuaikan ID container Anda
      let visibleCount = 0;

      // Sembunyikan/Tampilkan Kartu
      for (let card of cards) {
        const isVisible = card.getAttribute('data-search').toLowerCase().includes(val);
        card.style.display = isVisible ? '' : 'none';
        if (isVisible) visibleCount++;
      }

      // Hapus notifikasi lama jika ada agar tidak duplikat
      const oldMsg = document.getElementById('no-data-msg');
      if (oldMsg) oldMsg.remove();

      // Tampilkan Notifikasi jika tidak ada data ditemukan
      if (visibleCount === 0) {
        const msg = document.createElement('div');
        msg.id = 'no-data-msg';
        msg.className = 'col-span-full text-center py-20 animate-fadeIn';
        msg.innerHTML = `
          <i class="fa-solid fa-magnifying-glass text-emerald-500/20 text-5xl mb-4 block"></i>
          <p class="text-emerald-500 font-black uppercase italic tracking-widest text-xs">
            Dokumen "${val}" JUDUL DOKUMEN TIDAK DITEMUKAN
          </p>
          <p class="text-slate-500 text-[10px] mt-2 uppercase">Coba kata kunci lain atau periksa ejaan Anda</p>
        `;
        container.appendChild(msg);
      }
    }

    function loadPage(pageName) {
      google.script.run.withSuccessHandler(url => {
        window.top.location.href = url + "?page=" + pageName;
      }).getAppUrl();
    }
  </script>
</body>
</html>
