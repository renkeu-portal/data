<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Mencegah scrollbar ganda di luar */
      background-color: #020617; /* Warna gelap sesuai tema */
    }

    .container-utama {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden; /* MEMOTONG BANNER GOOGLE */
    }

    #portal-frame {
      position: absolute;
      /* Geser ke atas 25px untuk menyembunyikan banner "Made by Google" */
      top: -25px; 
      left: 0;
      width: 100%;
      /* Tambah tinggi 25px agar bagian bawah tidak kosong */
      height: calc(100% + 25px); 
      border: none;
    }
  </style>
</head>
<body>

  <div class="container-utama">
    <iframe 
      id="portal-frame" 
      src="https://script.google.com/macros/s/AKfycbyxyuwy3_wRkRxUjCASj3dOcVsQokbrAnztLEZ_lYOy5GJjPQOrQ2eaz4K8tiwCOvEs/exec" 
      allow="clipboard-read; clipboard-write">
    </iframe>
  </div>

</body>
</html>
